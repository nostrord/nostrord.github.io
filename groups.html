<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nostrord - Kind 10009 Viewer</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: #18181b;
      --border: #27272a;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --primary: #a78bfa;
      --primary-dim: rgba(167, 139, 250, 0.1);
      --green: #4ade80;
      --green-dim: rgba(74, 222, 128, 0.12);
      --red: #f87171;
      --yellow: #facc15;
      --blue: #60a5fa;
      --blue-dim: rgba(96, 165, 250, 0.12);
      --font: 'Space Grotesk', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .container { max-width: 900px; width: 100%; }

    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
    h1 span { color: var(--primary); }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }

    .pubkey-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      word-break: break-all;
      margin-bottom: 1.5rem;
      min-height: 2.5rem;
    }

    /* pubkey input */
    .pubkey-form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }

    .pubkey-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .pubkey-input:focus { border-color: var(--primary); }
    .pubkey-input::placeholder { color: var(--text-muted); }
    .pubkey-input.error { border-color: var(--red); }

    .btn-load {
      background: var(--primary);
      color: #09090b;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.25rem;
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
    }
    .btn-load:hover { opacity: 0.85; }
    .btn-load:disabled { opacity: 0.5; cursor: not-allowed; }

    .input-error {
      font-size: 0.75rem;
      color: var(--red);
      margin-bottom: 0.75rem;
      font-family: var(--mono);
    }

    /* status */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--yellow);
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--green); }
    .status-dot.error { background: var(--red); }

    .relay-statuses { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1.5rem; }

    .relay-chip {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.65rem;
      font-size: 0.7rem;
      font-family: var(--mono);
      color: var(--text-muted);
    }
    .relay-chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--yellow); }
    .relay-chip .dot.ok { background: var(--green); }
    .relay-chip .dot.fail { background: var(--red); }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    /* group cards */
    .groups-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .group-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      transition: border-color 0.2s;
      display: flex;
      gap: 1rem;
      align-items: flex-start;
    }
    .group-card:hover { border-color: var(--primary); }

    .group-avatar {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: var(--border);
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      font-family: var(--mono);
      position: relative;
    }
    .group-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }
    .group-avatar .avatar-loading {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .group-body { flex: 1; min-width: 0; }

    .group-top {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.3rem;
    }

    .group-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }
    .group-name.loading { color: var(--text-muted); font-style: italic; font-size: 0.85rem; }

    .badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .badge-public  { background: var(--green-dim);   color: var(--green); border: 1px solid rgba(74,222,128,0.25); }
    .badge-private { background: rgba(248,113,113,0.1); color: var(--red);  border: 1px solid rgba(248,113,113,0.25); }
    .badge-open    { background: var(--blue-dim);    color: var(--blue);  border: 1px solid rgba(96,165,250,0.25); }
    .badge-closed  { background: rgba(250,204,21,0.1); color: var(--yellow); border: 1px solid rgba(250,204,21,0.25); }

    .group-meta {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .group-meta-id { color: var(--primary); }
    .group-meta-sep { opacity: 0.4; }
    .group-meta-relay { opacity: 0.7; }

    .group-about {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-top: 0.25rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* raw */
    .raw-section { margin-top: 2rem; }
    .raw-json {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 500px;
      overflow-y: auto;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .back-link {
      display: inline-block;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .back-link:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">&larr; Back to Nostrord</a>

    <h1>Kind <span>10009</span> Viewer</h1>
    <p class="subtitle">Pin list / Group list for pubkey:</p>

    <div class="pubkey-form">
      <input
        class="pubkey-input"
        id="pubkey-input"
        type="text"
        placeholder="npub1... or hex pubkey"
        autocomplete="off"
        spellcheck="false"
      >
      <button class="btn-load" id="btn-load">Load</button>
    </div>
    <div class="input-error" id="input-error" style="display:none;"></div>

    <div class="pubkey-box" id="pubkey-display"></div>

    <div class="status-bar">
      <div class="status-dot" id="main-status"></div>
      <span id="status-text">Connecting to relays...</span>
    </div>

    <div class="relay-statuses" id="relay-statuses"></div>

    <div class="section-title">Groups found</div>
    <div class="groups-list" id="groups-list">
      <div class="empty-state"><span class="spinner"></span><br><br>Loading...</div>
    </div>

    <div class="raw-section">
      <div class="section-title">Raw event (kind 10009)</div>
      <div class="raw-json" id="raw-json">Waiting for data...</div>
    </div>
  </div>

  <script>
    // ── bech32 decoder ────────────────────────────────────────────────────────
    const BECH32_CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';
    function bech32Decode(s) {
      s = s.toLowerCase();
      const sep = s.lastIndexOf('1');
      if (sep < 1 || sep + 7 > s.length) throw new Error('invalid bech32');
      const hrp = s.slice(0, sep);
      const data = [];
      for (let i = sep + 1; i < s.length; i++) {
        const d = BECH32_CHARSET.indexOf(s[i]);
        if (d === -1) throw new Error('invalid char');
        data.push(d);
      }
      if (!bech32Verify(hrp, data)) throw new Error('invalid checksum');
      return { hrp, words: data.slice(0, -6) };
    }
    function bech32Polymod(v) {
      const G = [0x3b6a57b2, 0x26508e6d, 0x1ea119fa, 0x3d4233dd, 0x2a1462b3];
      let c = 1;
      for (const x of v) { const b = c >> 25; c = ((c & 0x1ffffff) << 5) ^ x; for (let i = 0; i < 5; i++) if ((b >> i) & 1) c ^= G[i]; }
      return c;
    }
    function bech32Expand(hrp) {
      const r = [];
      for (let i = 0; i < hrp.length; i++) r.push(hrp.charCodeAt(i) >> 5);
      r.push(0);
      for (let i = 0; i < hrp.length; i++) r.push(hrp.charCodeAt(i) & 31);
      return r;
    }
    function bech32Verify(hrp, data) { return bech32Polymod(bech32Expand(hrp).concat(data)) === 1; }
    function words2bytes(words) {
      const bytes = []; let acc = 0, bits = 0;
      for (const v of words) { acc = ((acc << 5) | v) & 0xffff; bits += 5; if (bits >= 8) { bits -= 8; bytes.push((acc >> bits) & 0xff); } }
      return bytes;
    }
    function npubToHex(npub) {
      const { hrp, words } = bech32Decode(npub);
      if (hrp !== 'npub') throw new Error('not an npub');
      const bytes = words2bytes(words);
      if (bytes.length !== 32) throw new Error('invalid pubkey length');
      return bytes.map(b => b.toString(16).padStart(2, '0')).join('');
    }
    function parseInput(raw) {
      raw = raw.trim();
      if (!raw) throw new Error('Enter a pubkey or npub.');
      if (raw.startsWith('npub1')) return npubToHex(raw);
      if (/^[0-9a-fA-F]{64}$/.test(raw)) return raw.toLowerCase();
      throw new Error('Invalid format. Use hex (64 chars) or npub1...');
    }

    // ── constants ─────────────────────────────────────────────────────────────
    const DEFAULT_PUBKEY = '4abc8f17e30e49e8b960ea8211cfcc6448cc908b741e7f9819f066f272470848';
    const RELAYS = [
      'wss://relay.damus.io',
      'wss://nos.lol',
      'wss://relay.nostr.band',
      'wss://purplepag.es',
      'wss://relay.primal.net',
    ];

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const statusEl      = document.getElementById('main-status');
    const statusText    = document.getElementById('status-text');
    const relayStatusesEl = document.getElementById('relay-statuses');
    const groupsListEl  = document.getElementById('groups-list');
    const rawJsonEl     = document.getElementById('raw-json');
    const pubkeyDisplay = document.getElementById('pubkey-display');
    const pubkeyInput   = document.getElementById('pubkey-input');
    const btnLoad       = document.getElementById('btn-load');
    const inputError    = document.getElementById('input-error');

    // ── state ─────────────────────────────────────────────────────────────────
    let PUBKEY = DEFAULT_PUBKEY;
    let bestEvent = null;
    let finishedCount = 0;

    // ── helpers ───────────────────────────────────────────────────────────────
    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function avatarInitials(id) {
      return id ? id.slice(0, 2).toUpperCase() : '??';
    }

    // ── relay status chips ────────────────────────────────────────────────────
    function renderRelayChips() {
      relayStatusesEl.innerHTML = '';
      RELAYS.forEach((url, i) => {
        const chip = document.createElement('div');
        chip.className = 'relay-chip';
        chip.id = `relay-chip-${i}`;
        chip.innerHTML = `<span class="dot" id="relay-dot-${i}"></span>${url.replace('wss://', '')}`;
        relayStatusesEl.appendChild(chip);
      });
    }
    function setRelayStatus(index, status) {
      const dot = document.getElementById(`relay-dot-${index}`);
      if (!dot) return;
      dot.className = 'dot' + (status === 'ok' ? ' ok' : status === 'fail' ? ' fail' : '');
    }
    function updateMainStatus() {
      if (finishedCount === RELAYS.length) {
        if (bestEvent) {
          statusEl.className = 'status-dot connected';
          statusText.textContent = `Done — event from ${new Date(bestEvent.created_at * 1000).toLocaleString()}`;
        } else {
          statusEl.className = 'status-dot error';
          statusText.textContent = 'Done. No kind 10009 event found for this pubkey.';
        }
      } else {
        statusEl.className = 'status-dot';
        statusText.textContent = `Querying relays… (${finishedCount}/${RELAYS.length} done)`;
      }
    }

    // ── render group list (skeleton cards) ───────────────────────────────────
    function renderGroups() {
      if (!bestEvent) {
        groupsListEl.innerHTML = '<div class="empty-state">No groups found.</div>';
        return;
      }
      const groups = bestEvent.tags.filter(t => t[0] === 'group');
      if (groups.length === 0) {
        groupsListEl.innerHTML = '<div class="empty-state">Event found but no "group" tags. Check raw JSON below.</div>';
        return;
      }
      groupsListEl.innerHTML = '';
      groups.forEach(tag => {
        const groupId = tag[1] || 'unknown';
        const relay   = tag[2] || '';
        const cardId  = 'gc-' + CSS.escape(groupId + relay);

        const card = document.createElement('div');
        card.className = 'group-card';
        card.id = cardId;
        card.innerHTML = `
          <div class="group-avatar" id="av-${cardId}">
            <span class="avatar-loading"></span>
          </div>
          <div class="group-body">
            <div class="group-top">
              <span class="group-name loading" id="gname-${cardId}">fetching metadata…</span>
            </div>
            <div class="group-meta">
              <span class="group-meta-id">${escapeHtml(groupId)}</span>
              ${relay ? `<span class="group-meta-sep">·</span><span class="group-meta-relay">${escapeHtml(relay.replace('wss://', ''))}</span>` : ''}
            </div>
            <div class="group-about" id="gabout-${cardId}"></div>
          </div>
        `;
        groupsListEl.appendChild(card);

        if (relay) fetchGroupMeta(groupId, relay, cardId);
        else applyMeta(cardId, groupId, null);
      });
    }

    // ── update a card with kind-39000 metadata ────────────────────────────────
    function applyMeta(cardId, groupId, meta) {
      const nameEl  = document.getElementById(`gname-${cardId}`);
      const aboutEl = document.getElementById(`gabout-${cardId}`);
      const avEl    = document.getElementById(`av-${cardId}`);
      const topEl   = nameEl ? nameEl.closest('.group-top') : null;

      if (!nameEl) return;

      const name    = meta && getTag(meta.tags, 'name')    || null;
      const about   = meta && getTag(meta.tags, 'about')   || null;
      const picture = meta && getTag(meta.tags, 'picture') || null;
      const isPublic  = meta && meta.tags.some(t => t[0] === 'public');
      const isPrivate = meta && meta.tags.some(t => t[0] === 'private');
      const isOpen    = meta && meta.tags.some(t => t[0] === 'open');
      const isClosed  = meta && meta.tags.some(t => t[0] === 'closed');

      // name
      nameEl.className = 'group-name';
      nameEl.textContent = name || groupId;

      // about
      if (aboutEl) aboutEl.textContent = about || '';

      // avatar
      if (avEl) {
        if (picture) {
          const img = document.createElement('img');
          img.src = picture;
          img.alt = '';
          img.onerror = () => {
            img.remove();
            avEl.textContent = avatarInitials(name || groupId);
          };
          avEl.innerHTML = '';
          avEl.appendChild(img);
        } else {
          avEl.textContent = avatarInitials(name || groupId);
        }
      }

      // badges
      if (topEl) {
        topEl.querySelectorAll('.badge').forEach(b => b.remove());
        if (isPublic)  topEl.appendChild(makeBadge('public',  'public'));
        if (isPrivate) topEl.appendChild(makeBadge('private', 'private'));
        if (isOpen)    topEl.appendChild(makeBadge('open',    'open'));
        if (isClosed)  topEl.appendChild(makeBadge('closed',  'closed'));
        if (!meta) topEl.appendChild(makeBadge('no meta', 'private'));
      }
    }

    function makeBadge(label, type) {
      const b = document.createElement('span');
      b.className = `badge badge-${type}`;
      b.textContent = label;
      return b;
    }

    function getTag(tags, name) {
      const t = tags.find(t => t[0] === name);
      return t ? t[1] : null;
    }

    // ── fetch kind 39000 from group relay ────────────────────────────────────
    function fetchGroupMeta(groupId, relayUrl, cardId) {
      return new Promise((resolve) => {
        let ws;
        const subId = 'meta_' + Math.random().toString(36).slice(2, 10);
        const timeout = setTimeout(() => {
          try { ws && ws.close(); } catch (_) {}
          applyMeta(cardId, groupId, null);
          resolve();
        }, 8000);

        try { ws = new WebSocket(relayUrl); }
        catch (_) {
          clearTimeout(timeout);
          applyMeta(cardId, groupId, null);
          resolve();
          return;
        }

        ws.onopen = () => {
          ws.send(JSON.stringify(['REQ', subId, { kinds: [39000], '#d': [groupId], limit: 1 }]));
        };

        ws.onmessage = (msg) => {
          try {
            const data = JSON.parse(msg.data);
            if (data[0] === 'EVENT' && data[1] === subId && data[2]) {
              clearTimeout(timeout);
              applyMeta(cardId, groupId, data[2]);
              ws.send(JSON.stringify(['CLOSE', subId]));
              ws.close();
              resolve();
            }
            if (data[0] === 'EOSE') {
              clearTimeout(timeout);
              // no event arrived before EOSE → no metadata
              applyMeta(cardId, groupId, null);
              ws.send(JSON.stringify(['CLOSE', subId]));
              ws.close();
              resolve();
            }
          } catch (_) {}
        };

        ws.onerror = () => {
          clearTimeout(timeout);
          applyMeta(cardId, groupId, null);
          resolve();
        };

        ws.onclose = () => { clearTimeout(timeout); resolve(); };
      });
    }

    // ── fetch kind 10009 from one relay ──────────────────────────────────────
    function queryRelay(url, index) {
      return new Promise((resolve) => {
        let ws;
        const subId = 'sub_' + Math.random().toString(36).slice(2, 10);
        const timeout = setTimeout(() => {
          try { ws && ws.close(); } catch (_) {}
          setRelayStatus(index, 'fail');
          finishedCount++;
          updateMainStatus();
          resolve();
        }, 10000);

        try { ws = new WebSocket(url); }
        catch (_) {
          clearTimeout(timeout);
          setRelayStatus(index, 'fail');
          finishedCount++;
          updateMainStatus();
          resolve();
          return;
        }

        ws.onopen = () => {
          setRelayStatus(index, 'ok');
          ws.send(JSON.stringify(['REQ', subId, { kinds: [10009], authors: [PUBKEY], limit: 1 }]));
        };

        ws.onmessage = (msg) => {
          try {
            const data = JSON.parse(msg.data);
            if (data[0] === 'EVENT' && data[1] === subId && data[2]) {
              const ev = data[2];
              if (!bestEvent || ev.created_at > bestEvent.created_at) {
                bestEvent = ev;
                renderGroups();
                rawJsonEl.textContent = JSON.stringify(bestEvent, null, 2);
              }
            }
            if (data[0] === 'EOSE') {
              clearTimeout(timeout);
              ws.send(JSON.stringify(['CLOSE', subId]));
              ws.close();
              finishedCount++;
              updateMainStatus();
              resolve();
            }
          } catch (_) {}
        };

        ws.onerror = () => {
          clearTimeout(timeout);
          setRelayStatus(index, 'fail');
          finishedCount++;
          updateMainStatus();
          resolve();
        };

        ws.onclose = () => { clearTimeout(timeout); resolve(); };
      });
    }

    // ── main flow ─────────────────────────────────────────────────────────────
    function resetState() {
      bestEvent = null;
      finishedCount = 0;
    }

    async function loadForPubkey(hex) {
      PUBKEY = hex;
      pubkeyDisplay.textContent = hex;

      const url = new URL(window.location);
      url.searchParams.set('pk', hex);
      window.history.replaceState(null, '', url.toString());

      resetState();
      groupsListEl.innerHTML = '<div class="empty-state"><span class="spinner"></span><br><br>Loading…</div>';
      rawJsonEl.textContent = 'Waiting for data…';
      renderRelayChips();
      updateMainStatus();

      await Promise.all(RELAYS.map((u, i) => queryRelay(u, i)));

      if (!bestEvent) {
        groupsListEl.innerHTML = '<div class="empty-state">No groups found.</div>';
        rawJsonEl.textContent = 'No event received.';
      }
      updateMainStatus();
      btnLoad.disabled = false;
    }

    // ── input handlers ────────────────────────────────────────────────────────
    btnLoad.addEventListener('click', () => {
      inputError.style.display = 'none';
      pubkeyInput.classList.remove('error');
      let hex;
      try { hex = parseInput(pubkeyInput.value); }
      catch (e) {
        inputError.textContent = e.message;
        inputError.style.display = 'block';
        pubkeyInput.classList.add('error');
        return;
      }
      btnLoad.disabled = true;
      loadForPubkey(hex);
    });

    pubkeyInput.addEventListener('keydown', e => { if (e.key === 'Enter') btnLoad.click(); });

    // ── boot ──────────────────────────────────────────────────────────────────
    (async () => {
      const params = new URL(window.location).searchParams;
      const pkParam = params.get('pk');
      let initial = DEFAULT_PUBKEY;
      if (pkParam) {
        try { initial = parseInput(pkParam); } catch (_) {}
      }
      pubkeyInput.value = (initial === DEFAULT_PUBKEY && !pkParam) ? '' : (pkParam || '');
      await loadForPubkey(initial);
    })();
  </script>
</body>
</html>
